<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Yakında Açılacak</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&display=swap" rel="stylesheet">
  <style>
    /* Genel stil */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #1f1c2c, #928dab);
      font-family: 'Orbitron', sans-serif;
      color: #fff;
      text-align: center;
    }
    .container {
      padding: 40px;
      background: rgba(0,0,0,0.5);
      border-radius: 20px;
      box-shadow: 0 0 40px rgba(0,0,0,0.6);
    }
    h1 {
      font-size: 3rem;
      margin-bottom: 20px;
      text-transform: uppercase;
      letter-spacing: 4px;
      color: #ff6ec7;
    }
    p {
      font-size: 1.2rem;
      margin-bottom: 10px;
      color: #fff;
    }
    .discord {
      margin-top: 20px;
      font-size: 1.5rem;
      color: #00ffff;
      font-weight: bold;
    }
    /* Havalı animasyon */
    @keyframes glow {
      0%, 100% { text-shadow: 0 0 10px #ff6ec7, 0 0 20px #ff6ec7, 0 0 30px #ff6ec7; }
      50% { text-shadow: 0 0 20px #ff6ec7, 0 0 40px #ff6ec7, 0 0 60px #ff6ec7; }
    }
    h1 {
      animation: glow 2s infinite;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Yakında Açılacak</h1>
    <p>yakında.</p>
    <p class="discord">Discord: yelerax</p>
  </div>
</body>
</html>
