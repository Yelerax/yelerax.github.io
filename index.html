<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yakında Açılacak</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;700&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    font-family: 'Plus Jakarta Sans', sans-serif;
    background-color: #f5f5f5;
    color:#333;
  }
  .container {
    width: 400px;
    max-width: 90%;
    padding: 30px 25px;
    border-radius: 12px;
    background-color: #fff;
    box-shadow: 0 6px 20px rgba(0,0,0,0.1);
    text-align:center;
  }
  h1 {
    font-size: 2.5rem;
    font-weight: 700;
    margin-bottom: 15px;
  }
  p {
    font-size: 1rem;
    color: #555;
    margin-bottom: 10px;
  }
  .discord {
    font-size: 1.2rem;
    font-weight: 600;
    color: #0066cc;
    margin-top: 15px;
  }
  @media (max-width:480px){
    h1{ font-size:2rem; }
    p{ font-size:0.9rem; }
    .discord{ font-size:1rem; }
    .container{ padding:25px 20px; }
  }
</style>
</head>
<body>
  <div class="container">
    <h1>Yakında</h1>
    <p>Siteyi hazırlıyoruz. Çok yakında buradayız.</p>
    <p class="discord">Discord: yelerax</p>
  </div>
</body>
</html>
